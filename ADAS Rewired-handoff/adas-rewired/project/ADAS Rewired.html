<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ADAS Rewired · Scenario Control</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles/tokens.css" />
  <style>
    @keyframes pulse {
      0%   { opacity: 1; transform: scale(1); }
      50%  { opacity: 0.45; transform: scale(0.88); }
      100% { opacity: 1; transform: scale(1); }
    }
  </style>

  <!-- React -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Three.js + minimal inline OrbitControls -->
  <script src="https://unpkg.com/three@0.149.0/build/three.min.js"></script>
  <script>
    // Minimal OrbitControls — pan/zoom/rotate around a target.
    (function(){
      class OrbitControls extends THREE.EventDispatcher {
        constructor(camera, domEl){
          super();
          this.object = camera;
          this.domElement = domEl;
          this.enabled = true;
          this.target = new THREE.Vector3();
          this.minDistance = 0;
          this.maxDistance = Infinity;
          this.minPolarAngle = 0;
          this.maxPolarAngle = Math.PI;
          this.enableDamping = false;
          this.dampingFactor = 0.08;
          this.rotateSpeed = 1.0;
          this.zoomSpeed = 1.0;
          this.panSpeed = 1.0;
          this.enableRotate = true;
          this.enablePan = true;
          this.enableZoom = true;

          this._spherical = new THREE.Spherical();
          this._sphericalDelta = new THREE.Spherical();
          this._panOffset = new THREE.Vector3();
          this._scale = 1;
          this._state = "none";
          this._rotStart = new THREE.Vector2();
          this._rotEnd = new THREE.Vector2();
          this._panStart = new THREE.Vector2();
          this._panEnd = new THREE.Vector2();
          this._EPS = 1e-6;

          const el = domEl;
          el.style.touchAction = "none";

          this._onPointerDown = (e) => {
            if (!this.enabled) return;
            el.setPointerCapture?.(e.pointerId);
            if (e.button === 0 && !e.shiftKey) {
              this._state = "rotate";
              this._rotStart.set(e.clientX, e.clientY);
            } else if (e.button === 2 || e.shiftKey || e.button === 1) {
              this._state = "pan";
              this._panStart.set(e.clientX, e.clientY);
            }
          };
          this._onPointerMove = (e) => {
            if (!this.enabled) return;
            if (this._state === "rotate") {
              this._rotEnd.set(e.clientX, e.clientY);
              const d = this._rotEnd.clone().sub(this._rotStart);
              const h = el.clientHeight;
              this._sphericalDelta.theta -= 2 * Math.PI * d.x / h * this.rotateSpeed;
              this._sphericalDelta.phi -= 2 * Math.PI * d.y / h * this.rotateSpeed;
              this._rotStart.copy(this._rotEnd);
            } else if (this._state === "pan") {
              this._panEnd.set(e.clientX, e.clientY);
              const d = this._panEnd.clone().sub(this._panStart);
              this._pan(d.x, d.y);
              this._panStart.copy(this._panEnd);
            }
          };
          this._onPointerUp = () => { this._state = "none"; };
          this._onWheel = (e) => {
            if (!this.enabled || !this.enableZoom) return;
            e.preventDefault();
            if (e.deltaY < 0) this._scale /= Math.pow(0.95, this.zoomSpeed);
            else this._scale *= Math.pow(0.95, this.zoomSpeed);
          };
          this._onContext = (e) => e.preventDefault();

          el.addEventListener("pointerdown", this._onPointerDown);
          el.addEventListener("pointermove", this._onPointerMove);
          el.addEventListener("pointerup", this._onPointerUp);
          el.addEventListener("pointercancel", this._onPointerUp);
          el.addEventListener("wheel", this._onWheel, { passive: false });
          el.addEventListener("contextmenu", this._onContext);
        }
        _pan(dx, dy){
          const el = this.domElement;
          const off = new THREE.Vector3();
          off.copy(this.object.position).sub(this.target);
          let dist = off.length();
          dist *= Math.tan((this.object.fov / 2) * Math.PI / 180);
          const x = (2 * dx * dist / el.clientHeight) * this.panSpeed;
          const y = (2 * dy * dist / el.clientHeight) * this.panSpeed;
          const te = this.object.matrix.elements;
          const vx = new THREE.Vector3(te[0], te[1], te[2]).multiplyScalar(-x);
          const vy = new THREE.Vector3(te[4], te[5], te[6]).multiplyScalar(y);
          this._panOffset.add(vx).add(vy);
        }
        update(){
          const offset = new THREE.Vector3();
          offset.copy(this.object.position).sub(this.target);
          this._spherical.setFromVector3(offset);
          this._spherical.theta += this._sphericalDelta.theta;
          this._spherical.phi += this._sphericalDelta.phi;
          this._spherical.phi = Math.max(this.minPolarAngle, Math.min(this.maxPolarAngle, this._spherical.phi));
          this._spherical.phi = Math.max(this._EPS, Math.min(Math.PI - this._EPS, this._spherical.phi));
          this._spherical.radius *= this._scale;
          this._spherical.radius = Math.max(this.minDistance, Math.min(this.maxDistance, this._spherical.radius));
          this.target.add(this._panOffset);
          offset.setFromSpherical(this._spherical);
          this.object.position.copy(this.target).add(offset);
          this.object.lookAt(this.target);
          if (this.enableDamping) {
            this._sphericalDelta.theta *= (1 - this.dampingFactor);
            this._sphericalDelta.phi *= (1 - this.dampingFactor);
            this._panOffset.multiplyScalar(1 - this.dampingFactor);
          } else {
            this._sphericalDelta.set(0, 0, 0);
            this._panOffset.set(0, 0, 0);
          }
          this._scale = 1;
          return true;
        }
        dispose(){
          const el = this.domElement;
          el.removeEventListener("pointerdown", this._onPointerDown);
          el.removeEventListener("pointermove", this._onPointerMove);
          el.removeEventListener("pointerup", this._onPointerUp);
          el.removeEventListener("wheel", this._onWheel);
          el.removeEventListener("contextmenu", this._onContext);
        }
      }
      THREE.OrbitControls = OrbitControls;
    })();
  </script>
</head>
<body>
  <div id="root"></div>

  <!-- Data layer -->
  <script type="module">
    import { SCENARIOS, MAPS, getScenario, ACTOR_KINDS } from "./src/scenarios.js";
    import { backend } from "./src/backend.js";
    import { Simulation } from "./src/simulation.js";
    import { Scene3D } from "./src/scene3d.js";
    Object.assign(window, { SCENARIOS, MAPS, getScenario, ACTOR_KINDS, backend, Simulation, Scene3D });
    window.dispatchEvent(new CustomEvent("data-ready"));
  </script>

  <!-- Boot React only once data is ready -->
  <script>
    function bootUI() {
      // Common first (Icon/Chip/Panel/…)
      const common = document.createElement("script");
      common.type = "text/babel";
      common.src = "src/ui/common.jsx";
      document.body.appendChild(common);

      [
        "src/ui/sensor_tiles.jsx",
        "src/ui/scenario_builder.jsx",
        "src/ui/library.jsx",
        "src/ui/live_run.jsx",
        "src/ui/map_view.jsx",
        "src/ui/app.jsx",
      ].forEach((src) => {
        const s = document.createElement("script");
        s.type = "text/babel";
        s.src = src;
        s.setAttribute("data-presets", "env,react");
        document.body.appendChild(s);
      });
    }
    window.addEventListener("data-ready", bootUI);
  </script>
</body>
</html>
